name: Deploy to Azure Container Apps
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Build and push to ACR
        run: |
          az acr login --name claudeitagentacr
          docker build -t claudeitagentacr.azurecr.io/claude-it-agent:latest .
          docker push claudeitagentacr.azurecr.io/claude-it-agent:latest
      - name: Deploy to Container App
        run: |
          az containerapp update --name claude-it-agent --resource-group claude-it-agent-rg --image claudeitagentacr.azurecr.io/claude-it-agent:latest
      - name: Done
        run: echo "Live at https://claude-it-agent.whitestone-6cbe99bc.eastus.azurecontainerapps.io"
