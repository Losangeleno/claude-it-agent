name: Build and Deploy to Azure Container Apps

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Log in to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Build and push image via Azure Container Registry
      run: |
        az acr build \
          --registry ca1e789bcd69acr \
          --image claude-it-agent:${{ github.sha }} \
          .

    - name: Deploy to Azure Container Apps
      run: |
        az containerapp update \
          --name claude-it-agent \
          --resource-group claude-it-agent-rg \
          --image ca1e789bcd69acr.azurecr.io/claude-it-agent:${{ github.sha }}
