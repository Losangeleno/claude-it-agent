name: Deploy to Azure Container Apps
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - uses: azure/docker-login@v1
        with:
          login-server: claudeitagentacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - run: |
          docker build -t claudeitagentacr.azurecr.io/claude-it-agent:latest .
          docker push claudeitagentacr.azurecr.io/claude-it-agent:latest
      - uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: claude-it-agent-rg
          containerAppName: claude-it-agent
          imageToDeploy: claudeitagentacr.azurecr.io/claude-it-agent:latest
          registryUrl: claudeitagentacr.azurecr.io
          registryUsername: ${{ secrets.ACR_USERNAME }}
          registryPassword: ${{ secrets.ACR_PASSWORD }}
